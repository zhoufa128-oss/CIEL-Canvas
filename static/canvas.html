<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/brand/ciel/favicon.ico?v=2026.07.13.ciel-canvas-portable-release-rc1" type="image/x-icon">
    <link rel="apple-touch-icon" href="/static/brand/ciel/apple-touch-icon.png?v=2026.07.13.ciel-canvas-portable-release-rc1">
    <link rel="manifest" href="/static/brand/ciel/manifest.webmanifest?v=2026.07.13.ciel-canvas-portable-release-rc1">
    <title>CIEL Canvas — 无限画布</title>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    <script src="/static/vendor/js/tailwindcss-cdn.js?v=2026.07.13.ciel-canvas-portable-release-rc1"></script>
    <script src="/static/vendor/js/lucide.js?v=2026.07.13.ciel-canvas-portable-release-rc1"></script>
    <script src="/static/js/theme.js?v=2026.07.13.ciel-canvas-portable-release-rc1"></script>
    <script src="/static/js/i18n.js?v=2026.07.13.ciel-canvas-portable-release-rc1"></script>
    <link rel="stylesheet" href="/static/css/canvas.css?v=2026.07.13.ciel-canvas-portable-release-rc1">
    <link rel="stylesheet" href="/static/css/theme.css?v=2026.07.13.ciel-canvas-portable-release-rc1">
</head>
<body>
    <div id="shell" class="shell no-canvas">
        <div class="topbar">
            <div class="panel canvas-nav">
                <button id="backToManagerBtn" class="tool-btn" type="button" title="返回画布管理" aria-label="返回画布管理" data-i18n-title="canvas.backToManager"><i data-lucide="arrow-left" class="w-4 h-4"></i></button>
                <div class="canvas-nav-meta">
                    <div id="currentCanvasTitle" class="current-canvas-title">未命名画布</div>
                    <div id="currentCanvasTime" class="current-canvas-time">--</div>
                </div>
                <p id="saveState" style="display:none" data-i18n="canvas.chooseFirst">请选择或新建画布</p>
            </div>
            <div id="quickToolbar" class="panel toolbar editor-only">
                <button class="tool-btn toolbar-toggle" type="button" onclick="toggleQuickToolbar()" title="折叠快捷菜单" aria-label="折叠快捷菜单"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                <div class="toolbar-items">
                    <button class="tool-btn" onclick="addImageNode()"><i data-lucide="image-plus" class="w-4 h-4"></i><span data-i18n="canvas.image">图片</span></button>
                    <button class="tool-btn" onclick="addPromptNode()"><i data-lucide="text-cursor-input" class="w-4 h-4"></i><span data-i18n="canvas.prompt">提示词</span></button>
                    <button class="tool-btn" onclick="addLoopNode()"><i data-lucide="repeat-2" class="w-4 h-4"></i><span data-i18n="canvas.loop">循环</span></button>
                    <button class="tool-btn" onclick="addLLMNode()"><i data-lucide="message-square-text" class="w-4 h-4"></i>LLM</button>
                    <button class="tool-btn" onclick="addGeneratorNode()"><i data-lucide="wand-sparkles" class="w-4 h-4"></i><span data-i18n="canvas.apiGenerate">API生成</span></button>
                    <button class="tool-btn" onclick="addMsGenNode()"><i data-lucide="cloud-lightning" class="w-4 h-4"></i><span data-i18n="canvas.msGenerate">MS生成</span></button>
                    <button class="tool-btn" onclick="addVideoNode()"><i data-lucide="clapperboard" class="w-4 h-4"></i><span data-i18n="canvas.videoGenerate">视频生成</span></button>
                    <button class="tool-btn" onclick="addRhNode()"><i data-lucide="workflow" class="w-4 h-4"></i><span data-i18n="canvas.rhGenerate">RH生成</span></button>
                    <button class="tool-btn" onclick="addComfyNode()"><i data-lucide="workflow" class="w-4 h-4"></i>ComfyUI</button>
                    <button class="tool-btn" onclick="addLTXDirectorNode()"><i data-lucide="film" class="w-4 h-4"></i><span data-i18n="canvas.ltxDirector">LTX Director</span></button>
                    <button class="tool-btn" onclick="addOutputNode()"><i data-lucide="circle-dot" class="w-4 h-4"></i>Output</button>
                    <button class="tool-btn" onclick="groupSelectedImages()"><i data-lucide="group" class="w-4 h-4"></i><span data-i18n="canvas.group">分组</span></button>
                </div>
                <div class="toolbar-fixed">
                    <button id="canvasAssetToggle" class="tool-btn toolbar-asset canvas-asset-toggle" type="button" title="资产库" aria-label="资产库"><i data-lucide="library" class="w-4 h-4"></i><span>资产库</span></button>
                    <button class="tool-btn toolbar-log" onclick="openCanvasLog()" title="日志" aria-label="日志" data-i18n-title="canvas.logs"><i data-lucide="list-todo" class="w-4 h-4"></i><span data-i18n="canvas.logs">日志</span></button>
                </div>
            </div>
        </div>

        <div id="canvasGate" class="canvas-gate">
            <div class="gate-panel">
                <div class="gate-head">
                    <div class="gate-head-text">
                        <button id="gateBackBtn" class="gate-back-link" type="button"><i data-lucide="arrow-left" class="w-3.5 h-3.5"></i><span data-i18n="canvas.backToList">返回画布列表</span></button>
                        <div class="ciel-gate-brand" aria-label="CIEL Canvas，CIEL 无限画布">
                            <img src="/static/brand/ciel/ciel-mark-64.png?v=2026.07.13.ciel-canvas-portable-release-rc1" alt="" class="ciel-gate-brand-mark">
                            <div class="ciel-gate-brand-copy">
                                <div class="ciel-gate-brand-name">CIEL Canvas</div>
                                <div class="ciel-gate-brand-description">CIEL 无限画布</div>
                            </div>
                        </div>
                        <div class="gate-title-row">
                            <div id="gateTitleText" class="gate-title">选择画布</div>
                            <span id="gateCountPill" class="gate-count-pill">0</span>
                        </div>
                        <div id="gateSubtitle" class="gate-subtitle">打开已有画布，或新建一个开始创作。</div>
                    </div>
                    <div class="gate-head-actions">
                        <button id="gateRefreshBtn" class="gate-icon-btn" type="button" title="刷新列表" aria-label="刷新列表" data-i18n-title="canvas.refresh">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                        </button>
                        <button id="gateTrashBtn" class="gate-icon-btn gate-trash-entry" type="button" title="打开回收站" aria-label="打开回收站" data-i18n-title="canvas.openTrash">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                            <span id="gateTrashCount" class="gate-trash-badge">0</span>
                        </button>
                        <button id="gateAssetManagerBtn" class="gate-icon-btn gate-manager-btn" type="button" title="资产库管理" aria-label="资产库管理" hidden>
                            <i data-lucide="library" class="w-4 h-4"></i>
                            <span>素材库管理</span>
                        </button>
                        <button id="gateCreateBtn" class="primary-btn" type="button"><i data-lucide="plus" class="w-4 h-4"></i><span data-i18n="canvas.newCanvas">新建画布</span></button>
                        <button id="gateCreateSmartBtn" class="smart-create-btn" type="button"><i data-lucide="sparkles" class="w-4 h-4"></i><span data-i18n="canvas.newSmartCanvas">新建智能画布</span></button>
                    </div>
                </div>
                <div id="gateStatus" class="gate-status" data-i18n="canvas.loadingCanvases">正在加载画布列表...</div>
                <div class="gate-create-row">
                    <input id="gateTitleInput" class="gate-name-input" type="text" maxlength="80" placeholder="新画布名称（可留空使用默认）" data-i18n-placeholder="canvas.newCanvasPlaceholder">
                    <button id="gateConfirmBtn" class="create-confirm" type="button" title="确定" aria-label="确定" data-i18n-title="common.confirm"><i data-lucide="check" class="w-4 h-4"></i></button>
                    <button id="gateCancelBtn" class="create-cancel" type="button" title="取消" aria-label="取消" data-i18n-title="common.cancel"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div class="trash-note"><i data-lucide="info" class="w-3.5 h-3.5 inline-block align-text-bottom mr-1"></i><span data-i18n="canvas.trashNote">回收站中的画布会在 30 天后自动清理。</span></div>
                <div id="gateCanvasList" class="gate-list"></div>
            </div>
        </div>

        <div id="board" class="board editor-only">
            <svg id="snapGuideLayer" class="snap-guide-layer" aria-hidden="true"></svg>
            <div id="dropOverlay" class="drop-overlay" data-i18n="canvas.dropImage">拖放图片到画布</div>
            <div id="selectionBox" class="selection-box"></div>
            <div id="selectionHub" class="selection-hub"></div>
            <div id="createMenu" class="create-menu">
                <button class="menu-btn" onclick="menuAdd('image')"><i data-lucide="image-plus" class="w-4 h-4"></i><span data-i18n="canvas.imageCard">上传节点</span></button>
                <button class="menu-btn" onclick="menuAdd('prompt')"><i data-lucide="text-cursor-input" class="w-4 h-4"></i><span data-i18n="canvas.prompt">提示词</span></button>
                <button class="menu-btn" onclick="menuAdd('loop')"><i data-lucide="repeat-2" class="w-4 h-4"></i><span data-i18n="canvas.loopNode">循环节点</span></button>
                <button class="menu-btn" onclick="menuAdd('llm')"><i data-lucide="message-square-text" class="w-4 h-4"></i><span data-i18n="canvas.llmNode">LLM 节点</span></button>
                <button class="menu-btn" onclick="menuAdd('generator')"><i data-lucide="wand-sparkles" class="w-4 h-4"></i><span data-i18n="canvas.apiGenerate">API生成</span></button>
                <button class="menu-btn" onclick="menuAdd('msgen')"><i data-lucide="cloud-lightning" class="w-4 h-4"></i><span data-i18n="canvas.modelscopeGenerate">Modelscope生成</span></button>
                <button class="menu-btn" onclick="menuAdd('video')"><i data-lucide="clapperboard" class="w-4 h-4"></i><span data-i18n="canvas.videoGenerateNode">视频生成</span></button>
                <button class="menu-btn" onclick="menuAdd('rh')"><i data-lucide="workflow" class="w-4 h-4"></i><span data-i18n="canvas.rhGenerate">RH生成</span></button>
                <button class="menu-btn" onclick="menuAdd('comfy')"><i data-lucide="workflow" class="w-4 h-4"></i><span data-i18n="canvas.comfyGenerate">ComfyUI 生成</span></button>
                <button class="menu-btn" onclick="menuAdd('ltxDirector')"><i data-lucide="film" class="w-4 h-4"></i><span data-i18n="canvas.ltxDirector">LTX Director</span></button>
                <button class="menu-btn" onclick="menuAdd('output')"><i data-lucide="circle-dot" class="w-4 h-4"></i>Output</button>
            </div>
            <div id="linkCreateMenu" class="create-menu"></div>
            <div id="nodeInputMenu" class="create-menu"></div>
            <div id="nodeOutputMenu" class="create-menu"></div>
            <div id="imageNodeMenu" class="create-menu"></div>
            <div id="world" class="world">
                <svg id="links" class="links"></svg>
                <div id="linkControls" class="link-controls"></div>
                <div id="nodes"></div>
            </div>
            <div id="minimap" class="minimap" title="导航地图">
                <div id="minimapContent" class="minimap-content">
                    <div id="minimapViewport" class="minimap-viewport"></div>
                </div>
            </div>
            <aside id="canvasAssetPanel" class="canvas-asset-panel">
                <div class="canvas-asset-head">
                    <strong><i data-lucide="library" class="w-4 h-4"></i><span>资产库</span></strong>
                    <button id="canvasAssetCloseBtn" class="canvas-asset-icon-btn" type="button" title="关闭"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <select id="canvasAssetLibrarySelect" class="canvas-asset-select"></select>
                <div class="canvas-asset-row">
                    <select id="canvasAssetCategorySelect" class="canvas-asset-select"></select>
                    <button id="canvasAssetAddCategoryBtn" class="canvas-asset-icon-btn" type="button" title="新建分组"><i data-lucide="folder-plus" class="w-4 h-4"></i></button>
                </div>
                <div id="canvasAssetDropZone" class="canvas-asset-drop">拖入图片或输出保存到当前分组</div>
                <div id="canvasAssetGrid" class="canvas-asset-grid"></div>
            </aside>
            <div id="canvasAssetHoverPreview" class="canvas-asset-hover-preview" hidden>
                <img alt="asset preview">
                <video muted preload="metadata" playsinline disablepictureinpicture controlslist="nodownload noplaybackrate noremoteplayback" style="display:none"></video>
                <div class="canvas-asset-hover-name"></div>
            </div>
        </div>
        <div class="hint editor-only" data-i18n="canvas.hint">拖拽画布或按住滚轮移动，Ctrl 框选多选，拖动选中节点可一起移动。图片/提示词节点右下端口拖线到生成节点。</div>
        <div id="outputLightbox" class="output-lightbox" onclick="closeOutputLightbox()">
            <div id="outputLightboxShell" class="output-lightbox-shell" onclick="event.stopPropagation()">
            <div id="outputPreview" class="output-preview">
                <div id="outputCompareContainer" class="output-compare">
                    <img id="outputCompareResult" alt="result image">
                    <div id="outputCompareOriginalWrap" class="output-compare-original-wrap">
                        <img id="outputCompareOriginal" alt="input image">
                    </div>
                    <div id="outputCompareSlider" class="output-compare-slider">
                        <div class="output-compare-handle"><i data-lucide="move-horizontal" class="w-4 h-4"></i></div>
                    </div>
                </div>
                <img id="outputLightboxImg" class="output-single-img" src="" alt="output preview">
                <video id="outputLightboxVideo" class="output-single-video" src="" controls playsinline disablepictureinpicture controlslist="nodownload noplaybackrate noremoteplayback" style="display:none"></video>
                <div class="output-preview-bar">
                    <div id="outputResolution" class="output-resolution">--</div>
                    <div class="output-preview-actions">
                        <button id="outputDownloadBtn" class="preview-icon-btn" type="button" title="下载" aria-label="下载" data-i18n-title="canvas.download"><i data-lucide="download" class="w-4 h-4"></i></button>
                        <button id="outputDownloadAllBtn" class="preview-icon-btn" type="button" title="下载全部图片" aria-label="下载全部图片" data-i18n-title="canvas.outputDownloadAllImages" style="display:none"><i data-lucide="archive" class="w-4 h-4"></i></button>
                        <button class="preview-icon-btn" type="button" title="关闭" aria-label="关闭" onclick="closeOutputLightbox()" data-i18n-title="common.close"><i data-lucide="x" class="w-4 h-4"></i></button>
                    </div>
                </div>
            </div>
            <div id="outputPromptPanel" class="output-prompt-panel">
                <div id="outputPromptText" class="output-prompt-text"></div>
                <div class="output-prompt-actions">
                    <button id="outputCopyPromptBtn" class="preview-text-btn secondary" type="button"><i data-lucide="copy" class="w-3.5 h-3.5"></i><span data-i18n="canvas.copyPrompt">复制提示词</span></button>
                    <button id="outputRerunBtn" class="preview-text-btn" type="button"><i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i><span data-i18n="canvas.rerun">再次运行</span></button>
                </div>
            </div>
            </div>
        </div>
        <div id="promptTemplateModal" class="prompt-template-modal" onclick="closePromptTemplateModal()">
            <div class="prompt-template-panel" onclick="event.stopPropagation()">
                <div class="prompt-template-head">
                    <div>
                        <div class="prompt-template-title" data-i18n="canvas.promptTemplateLibrary">提示词模板库</div>
                        <div class="prompt-template-sub" data-i18n="canvas.promptTemplateSystem">系统提示词</div>
                    </div>
                    <button class="preview-icon-btn" type="button" onclick="closePromptTemplateModal()" title="关闭" aria-label="关闭" data-i18n-title="common.close"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div class="prompt-template-toolbar">
                    <select id="promptTemplateLibrarySelect" class="prompt-template-library-select" title="选择提示词库"></select>
                    <input id="promptTemplateSearch" class="prompt-template-search" type="search" placeholder="搜索模板" data-i18n-placeholder="canvas.promptTemplateSearch">
                    <div id="promptTemplateCats" class="prompt-template-cats"></div>
                </div>
                <div class="prompt-template-content">
                    <div id="promptTemplateList" class="prompt-template-list"></div>
                    <div id="promptTemplateDetail" class="prompt-template-detail"></div>
                </div>
            </div>
        </div>
        <div id="logModal" class="log-modal" onclick="closeCanvasLog()">
            <div class="log-panel" onclick="event.stopPropagation()">
                <div class="log-head">
                    <div class="log-title" data-i18n="canvas.generationLogs">生成日志</div>
                    <button class="preview-icon-btn" type="button" onclick="closeCanvasLog()" title="关闭" data-i18n-title="common.close"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div id="logList" class="log-list"></div>
            </div>
        </div>
        <div id="assetManagerModal" class="asset-manager-modal" onclick="closeAssetManager()">
            <div class="asset-manager-panel" onclick="event.stopPropagation()">
                <div class="asset-manager-head">
                    <div>
                        <div class="asset-manager-title">资产库管理</div>
                        <div class="asset-manager-sub">管理图片资产库和提示词库</div>
                    </div>
                    <button class="preview-icon-btn" type="button" onclick="closeAssetManager()" title="关闭"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div class="asset-manager-tabs">
                    <button class="active" type="button" data-manager-tab="assets"><i data-lucide="image" class="w-4 h-4"></i><span>图片资产</span></button>
                    <button type="button" data-manager-tab="prompts"><i data-lucide="text-cursor-input" class="w-4 h-4"></i><span>提示词库</span></button>
                </div>
                <div id="assetManagerBody" class="asset-manager-body"></div>
            </div>
        </div>
        <div id="imageEditModal" class="image-edit-modal" onclick="closeImageEditor()">
            <div class="image-edit-panel" onclick="event.stopPropagation()">
                <div class="image-edit-head">
                    <div>
                        <div id="imageEditTitle" class="image-edit-title" data-i18n="canvas.editImage">编辑图片</div>
                        <div id="imageEditSub" class="image-edit-sub" data-i18n="canvas.editImageSub">选择裁剪、遮罩或画笔模式</div>
                    </div>
                    <div class="image-edit-mode">
                        <button type="button" data-image-edit-mode="crop" class="active"><i data-lucide="crop" class="w-3.5 h-3.5"></i><span data-i18n="canvas.modeCrop">裁剪</span></button>
                        <button type="button" data-image-edit-mode="outpaint"><i data-lucide="expand" class="w-3.5 h-3.5"></i><span data-i18n="canvas.modeOutpaint">扩展</span></button>
                        <button type="button" data-image-edit-mode="mask"><i data-lucide="brush" class="w-3.5 h-3.5"></i><span data-i18n="canvas.modeMask">遮罩</span></button>
                        <button type="button" data-image-edit-mode="brush"><i data-lucide="paintbrush" class="w-3.5 h-3.5"></i><span data-i18n="canvas.modeBrush">画笔</span></button>
                        <button type="button" data-image-edit-mode="grid"><i data-lucide="grid-3x3" class="w-3.5 h-3.5"></i><span data-i18n="canvas.modeGrid">宫格切分</span></button>
                    </div>
                    <button class="preview-icon-btn" type="button" onclick="closeImageEditor()" title="关闭" data-i18n-title="common.close"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div id="imageMaskTools" class="image-edit-tools">
                    <label><span data-i18n="canvas.brushSize">笔刷</span> <input id="maskBrushSize" type="range" min="4" max="160" value="42"></label>
                    <button id="maskUndoBtn" class="image-edit-btn secondary" type="button" onclick="undoEditDrawing()" title="撤销"><i data-lucide="undo-2" class="w-4 h-4"></i></button>
                    <button id="maskRedoBtn" class="image-edit-btn secondary" type="button" onclick="redoEditDrawing()" title="恢复"><i data-lucide="redo-2" class="w-4 h-4"></i></button>
                    <button class="image-edit-btn secondary" type="button" onclick="clearEditDrawing()"><i data-lucide="eraser" class="w-4 h-4"></i><span data-i18n="canvas.clear">清空</span></button>
                    <span class="image-edit-sub" data-i18n="canvas.maskHint">白色区域为要编辑的遮罩</span>
                </div>
                <div id="imageBrushTools" class="image-edit-tools">
                    <button class="image-edit-btn primary" type="button" data-brush-tool="free" onclick="setBrushTool('free')" title="自由画笔"><i data-lucide="paintbrush" class="w-4 h-4"></i></button>
                    <button class="image-edit-btn secondary" type="button" data-brush-tool="rect" onclick="setBrushTool('rect')" title="矩形"><i data-lucide="square" class="w-4 h-4"></i></button>
                    <button class="image-edit-btn secondary" type="button" data-brush-tool="ellipse" onclick="setBrushTool('ellipse')" title="椭圆"><i data-lucide="circle" class="w-4 h-4"></i></button>
                    <button class="image-edit-btn secondary" type="button" data-brush-tool="label" onclick="setBrushTool('label')" title="数字标签"><i data-lucide="list-ordered" class="w-4 h-4"></i></button>
                    <button class="image-edit-btn secondary" type="button" data-brush-tool="text" onclick="setBrushTool('text')" title="文字标签"><i data-lucide="type" class="w-4 h-4"></i></button>
                    <label><span data-i18n="canvas.color">颜色</span> <input id="paintBrushColor" type="color" value="#ff2d55"></label>
                    <label><span data-i18n="canvas.brushSize">笔刷</span> <input id="paintBrushSize" type="range" min="2" max="80" value="14"></label>
                    <button id="brushUndoBtn" class="image-edit-btn secondary" type="button" onclick="undoEditDrawing()" title="撤销"><i data-lucide="undo-2" class="w-4 h-4"></i></button>
                    <button id="brushRedoBtn" class="image-edit-btn secondary" type="button" onclick="redoEditDrawing()" title="恢复"><i data-lucide="redo-2" class="w-4 h-4"></i></button>
                    <button class="image-edit-btn secondary" type="button" onclick="clearEditDrawing()"><i data-lucide="eraser" class="w-4 h-4"></i><span data-i18n="canvas.clear">清空</span></button>
                </div>
                <div id="imageGridTools" class="image-edit-tools">
                    <button id="gridCustomToggle" class="image-edit-btn secondary" type="button" onclick="toggleGridCustomMode()" data-i18n="canvas.gridCustom" data-i18n-title="canvas.gridCustomTitle" title="自由放置切割线">自定义</button>
                    <div class="grid-preset-row">
                        <span class="image-edit-sub" data-i18n="canvas.gridPresets">预设</span>
                        <button class="grid-preset-btn" type="button" onclick="applyGridPreset(1, 2)">1×2</button>
                        <button class="grid-preset-btn" type="button" onclick="applyGridPreset(2, 1)">2×1</button>
                        <button class="grid-preset-btn" type="button" onclick="applyGridPreset(2, 2)">2×2</button>
                        <button class="grid-preset-btn" type="button" onclick="applyGridPreset(2, 3)">2×3</button>
                        <button class="grid-preset-btn" type="button" onclick="applyGridPreset(3, 2)">3×2</button>
                        <button class="grid-preset-btn" type="button" onclick="applyGridPreset(3, 3)">3×3</button>
                    </div>
                    <span id="gridRegularControls" style="display:contents">
                        <label><span data-i18n="canvas.gridHLines">横向线</span> <input id="gridHorizontalLines" type="number" min="0" max="20" value="2"></label>
                        <label><span data-i18n="canvas.gridVLines">竖向线</span> <input id="gridVerticalLines" type="number" min="0" max="20" value="2"></label>
                    </span>
                    <div id="gridCustomControls" style="display:none;align-items:center;gap:6px">
                        <button id="gridOrientH" class="image-edit-btn primary" type="button" onclick="setGridCustomOrientation('h')" data-i18n="canvas.gridOrientH" data-i18n-title="canvas.gridOrientHTitle" title="点击图片放置水平线">水平</button>
                        <button id="gridOrientV" class="image-edit-btn secondary" type="button" onclick="setGridCustomOrientation('v')" data-i18n="canvas.gridOrientV" data-i18n-title="canvas.gridOrientVTitle" title="点击图片放置竖直线">垂直</button>
                        <button id="gridUndoBtn" class="image-edit-btn secondary" type="button" onclick="undoGridCustomLine()" data-i18n-title="canvas.gridUndo" title="撤销上一条线" disabled style="opacity:.4"><i data-lucide="undo-2" class="w-3.5 h-3.5"></i></button>
                        <button class="image-edit-btn secondary" type="button" onclick="clearGridCustomLines()" data-i18n-title="canvas.gridClearLines" title="清除所有自定义线"><i data-lucide="eraser" class="w-3.5 h-3.5"></i></button>
                    </div>
                    <label class="grid-gap-control"><span data-i18n="canvas.gridGap">间隔(px)</span> <input id="gridGapSize" type="range" min="0" max="240" step="1" value="0"><span id="gridGapValue" class="grid-gap-value">0</span></label>
                    <span id="gridSplitCount" class="image-edit-sub"></span>
                </div>
                <div id="imageEditStage" class="image-edit-stage">
                    <div class="image-edit-stage-inner">
                        <div id="cropCanvas" class="crop-canvas">
                            <img id="cropImage" alt="crop source">
                            <canvas id="editDrawCanvas" class="edit-draw-canvas"></canvas>
                            <canvas id="editTextCanvas" class="edit-text-canvas"></canvas>
                            <div id="cropBox" class="crop-box">
                                <div id="cropHandle" class="crop-handle"></div>
                            </div>
                            <div id="outpaintFrame" class="outpaint-frame">
                                <div class="outpaint-handle" data-outpaint-handle="top"></div>
                                <div class="outpaint-handle" data-outpaint-handle="right"></div>
                                <div class="outpaint-handle" data-outpaint-handle="bottom"></div>
                                <div class="outpaint-handle" data-outpaint-handle="left"></div>
                                <div class="outpaint-handle" data-outpaint-handle="corner"></div>
                            </div>
                            <div id="outpaintResolution" class="outpaint-resolution"></div>
                        </div>
                    </div>
                </div>
                <div class="image-edit-actions">
                    <span id="imageEditZoomLabel" style="color:#94a3b8;font-size:11px;font-weight:800;padding:0 4px;margin-right:auto;cursor:pointer;user-select:none" title="双击重置缩放" ondblclick="resetImageEditZoom()">100%</span>
                    <button class="image-edit-btn secondary" type="button" onclick="resetCropBox()"><i data-lucide="rotate-ccw" class="w-4 h-4"></i><span data-i18n="canvas.reset">重置</span></button>
                    <button class="image-edit-btn secondary" type="button" onclick="closeImageEditor()" data-i18n="common.cancel">取消</button>
                    <button id="imageEditApplyBtn" class="image-edit-btn primary" type="button" onclick="applyImageEdit()"><i data-lucide="crop" class="w-4 h-4"></i><span data-i18n="canvas.applyCrop">应用裁剪</span></button>
                </div>
            </div>
        </div>
        <div id="errorModal" class="error-modal" onclick="closeErrorModal()">
            <div class="error-panel" onclick="event.stopPropagation()">
                <div class="error-head">
                    <div id="errorTitle" class="error-title" data-i18n="canvas.generationFailed">生成失败</div>
                    <button class="preview-icon-btn" type="button" title="关闭" aria-label="关闭" onclick="closeErrorModal()"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
                <div id="errorMessage" class="error-message"></div>
                <div class="error-actions">
                    <button class="error-btn" type="button" onclick="copyErrorMessage()"><i data-lucide="copy" class="w-4 h-4"></i><span>复制</span></button>
                    <button class="error-btn primary" type="button" onclick="closeErrorModal()">关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/ltx-director-timeline.js?v=2026.07.13.ciel-canvas-portable-release-rc1"></script>
    <script src="/static/js/canvas.js?v=2026.07.13.ciel-canvas-portable-release-rc1"></script>
</body>
</html>
