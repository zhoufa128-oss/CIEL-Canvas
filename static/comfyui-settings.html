<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/static/brand/ciel/favicon.ico?v=2026.07.13.ciel-canvas-portable-release-rc1" type="image/x-icon">
    <link rel="apple-touch-icon" href="/static/brand/ciel/apple-touch-icon.png?v=2026.07.13.ciel-canvas-portable-release-rc1">
    <link rel="manifest" href="/static/brand/ciel/manifest.webmanifest?v=2026.07.13.ciel-canvas-portable-release-rc1">
    <title>CIEL Canvas · 工作流设置</title>
    <script>
        (function(){
            try {
                var theme = localStorage.getItem('studio_theme') || localStorage.getItem('canvas_theme') || 'light';
                if(theme === 'dark') {
                    document.documentElement.classList.add('studio-theme-dark');
                    document.documentElement.classList.add('theme-dark');
                }
            } catch(e) {}
        })();
    </script>
    <script src="/static/vendor/js/tailwindcss-cdn.js?v=2026.07.13.ciel-canvas-portable-release-rc1"></script>
    <script src="/static/vendor/js/lucide.js?v=2026.07.13.ciel-canvas-portable-release-rc1"></script>
    <script src="/static/js/theme.js?v=2026.07.13.ciel-canvas-portable-release-rc1"></script>
    <script src="/static/js/i18n.js?v=2026.07.13.ciel-canvas-portable-release-rc1"></script>
    <link rel="stylesheet" href="/static/css/comfyui-settings.css?v=2026.07.13.ciel-canvas-portable-release-rc1">
    <link rel="stylesheet" href="/static/css/theme.css?v=2026.07.13.ciel-canvas-portable-release-rc1">
</head>
<body>
    <div class="page">
        <div class="wrap">
            <header class="page-head">
                <div>
                    <div class="title" data-i18n="comfy.title">工作流设置</div>
                    <div class="sub" data-i18n="comfy.subtitle">选择本地 ComfyUI 工作流，配置可暴露到画布的输入参数。</div>
                </div>
                <div id="status" class="status"></div>
            </header>

            <div class="layout">
                <aside class="sidebar">
                    <div class="side-card workflow-panel workflow-panel-comfy">
                        <div class="side-title">ComfyUI 后端地址</div>
                        <div id="comfyInstancesList" style="display:flex;flex-direction:column;gap:6px"></div>
                        <button class="upload-btn" type="button" onclick="addComfyInstance()">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i><span>添加后端</span>
                        </button>
                        <div style="display:flex;gap:6px">
                            <button class="upload-btn" type="button" onclick="saveComfyInstances()" style="flex:1;border-style:solid;background:var(--panel);color:var(--text);border-color:var(--text)">
                                <i data-lucide="save" class="w-3.5 h-3.5"></i><span>保存</span>
                            </button>
                        </div>
                        <div style="font-size:10.5px;color:var(--faint);line-height:1.55;font-weight:600">格式：<span style="font-family:ui-monospace,Menlo,monospace">host:port</span>（如 <span style="font-family:ui-monospace,Menlo,monospace">127.0.0.1:8188</span>）</div>
                    </div>

                    <div class="side-card workflow-panel workflow-panel-comfy">
                        <div class="side-title" data-i18n="comfy.workflowList">工作流列表</div>
                        <div id="workflowList" class="workflow-list"></div>
                        <button class="upload-btn" type="button" onclick="document.getElementById('uploadInput').click()">
                            <i data-lucide="upload" class="w-3.5 h-3.5"></i><span data-i18n="comfy.uploadWorkflow">上传工作流</span>
                        </button>
                        <input id="uploadInput" type="file" accept="application/json" style="display:none" onchange="onUpload(event)">
                    </div>

                    <div class="side-card" id="previewCard">
                        <div class="preview-title-row">
                            <i data-lucide="eye" class="w-4 h-4" style="color:var(--muted)"></i>
                            <div class="preview-title" data-i18n="comfy.nodePreview">画布节点预览</div>
                            <div class="preview-pill" data-i18n="comfy.live">实时</div>
                        </div>
                        <div class="preview-desc" data-i18n="comfy.previewDesc">这个工作流在画布 Comfy 节点上将显示出的控件，可直接填写并点击「运行测试」。</div>
                        <div id="previewContent">
                            <div class="preview-empty" data-i18n="comfy.previewEmpty">勾选节点输入字段后<br>预览将出现在这里</div>
                        </div>
                    </div>
                </aside>

                <main class="content">
                    <div id="graphCard" class="graph-card" style="display:none">
                        <div class="graph-head">
                            <div class="graph-title-row">
                                <div style="min-width:0;flex:1">
                                    <div class="title-edit-row">
                                        <input id="workflowTitleInput" class="workflow-title-input" type="text" placeholder="工作流名称" data-i18n-placeholder="comfy.workflowName" oninput="updateWorkflowTitle(this.value)">
                                    </div>
                                    <div id="editorSub" class="editor-sub" data-i18n="comfy.editorSubDefault">从左侧列表选择，或上传新的 API 工作流</div>
                                </div>
                                <div class="content-actions">
                                    <button id="deleteBtn" class="action-btn danger-btn" type="button" onclick="onDelete()" style="display:none">
                                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i><span data-i18n="common.delete">删除</span>
                                    </button>
                                    <button id="saveBtn" class="action-btn save-btn" type="button" onclick="onSave()" style="display:none">
                                        <i data-lucide="save" class="w-3.5 h-3.5"></i><span data-i18n="comfy.saveConfig">保存配置</span>
                                    </button>
                                </div>
                            </div>
                            <div class="workspace-mode-tabs">
                                <button id="workspaceGraphTab" type="button" class="active" onclick="setWorkspaceMode('graph')" data-i18n="comfy.workflow">工作流</button>
                                <button id="workspaceCanvasTab" type="button" onclick="setWorkspaceMode('canvas')" data-i18n="comfy.testCanvas">测试画布</button>
                            </div>
                        </div>
                        <div class="graph-svg-wrap" style="position:relative">
                            <svg id="graphSvg" class="graph-svg"></svg>
                            <div class="graph-controls">
                                <div class="graph-ctrl-btn" onclick="graphZoom(-1)" title="缩小" data-i18n-title="canvas.decrease"><i data-lucide="zoom-out" class="w-4 h-4"></i></div>
                                <div id="zoomPill" class="graph-zoom-pill">100%</div>
                                <div class="graph-ctrl-btn" onclick="graphZoom(1)" title="放大" data-i18n-title="canvas.increase"><i data-lucide="zoom-in" class="w-4 h-4"></i></div>
                                <div class="graph-ctrl-btn" onclick="graphFit()" title="适应窗口"><i data-lucide="maximize" class="w-4 h-4"></i></div>
                            </div>
                            <div id="popupBackdrop" class="popup-backdrop" style="display:none" onclick="closeNodePopup()"></div>
                            <div id="nodePopup" class="popup-panel" style="display:none"></div>
                        </div>
                        <div id="miniCanvasHost" style="display:none"></div>
                    </div>
                    <div id="nodesToggle" class="nodes-toggle" style="display:none" onclick="toggleNodeList()">
                        <i data-lucide="list" class="w-3.5 h-3.5"></i>
                        <span id="nodesToggleText" data-i18n="comfy.showNodeList">显示完整节点列表</span>
                    </div>
                    <div id="nodeList" class="node-list hidden"></div>
                </main>

            </div>
        </div>
    </div>
    <div id="imageLightbox" class="image-lightbox" onclick="closeImagePreview()">
        <img id="imageLightboxImg" src="" alt="preview" onclick="event.stopPropagation()">
    </div>

    <script src="/static/js/comfyui-settings.js?v=2026.07.13.ciel-canvas-portable-release-rc1"></script>
</body>
</html>
